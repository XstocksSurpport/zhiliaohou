<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知了猴</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <header class="top">
    <span class="chain-tag">BNB Chain</span>
    <div class="wallet-actions">
      <button type="button" class="btn-connect" id="btnConnect">连接钱包</button>
      <div class="wallet-connected is-hidden" id="walletConnected">
        <span class="wallet-addr" id="walletAddr"></span>
        <button type="button" class="btn-disconnect" id="btnDisconnect">断开连接</button>
      </div>
    </div>
  </header>

  <main>
    <section class="intro">
      <h1>知了猴（金蝉）</h1>
      <p class="contract-addr">知了猴合约地址：0xcc77143e2bcda88621b23ae98540776a8fba7777</p>
      <p>知了猴 = 还没长翅膀、在土里趴着的蝉幼虫学名：金蝉，</p>
      <h2>1、一生过程</h2>
      <p>地下蛰伏 3～7 年，靠树根汁液活着，默默蓄力</p>
      <p>夏天晚上破土爬树 → 金蝉脱壳</p>
      <p>蜕完壳长出翅膀，变成会叫的知了</p>
      <h2>2、为啥用它做代币</h2>
      <p>谐音金钱，招财寓意</p>
      <p>地底闷声蛰伏 → 长线囤币、低调埋伏</p>
      <p>脱壳蜕变 → 暴涨起飞、一鸣惊人</p>
      <p>蝉蜕保值 → 币价抗跌、长久值钱。</p>
    </section>

    <section class="claim">
      <p class="claim-amount is-hidden" id="claimAmount"></p>
      <button type="button" class="btn-claim" id="btnClaim">索赔</button>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
